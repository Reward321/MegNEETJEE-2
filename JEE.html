  { no:25, subject:"Mathematics", section:"B", type:"integer",
    q:"Оұ = вҲ«вӮҖ^{2вҲҡ3} logвӮӮ(xВІ+4)dx + вҲ«вӮӮвҒҙ вҲҡ(2ЛЈвҲ’4)dx. Find ОұВІ.",
    ans:48
    // Second integral: let u=2ЛЈ-4, when x=2: u=0, x=4: u=12; du=2ЛЈln2 dx
    // Hard to compute directly. Use integration by parts / substitution
    // Let IвӮҒ=вҲ«вӮҖ^{2вҲҡ3}logвӮӮ(xВІ+4)dx; IвӮӮ=вҲ«вӮӮвҒҙвҲҡ(2ЛЈ-4)dx
    // For IвӮӮ: let t=вҲҡ(2ЛЈ-4); tВІ=2ЛЈ-4; 2t dt=2ЛЈln2 dx; dx=2t dt/(2ЛЈln2)=2t dt/((tВІ+4)ln2)
    // x=2вҶ’t=0; x=4вҶ’t=вҲҡ12=2вҲҡ3
    // IвӮӮ=вҲ«вӮҖ^{2вҲҡ3} t В· 2t/((tВІ+4)ln2) dt = (2/ln2)вҲ«вӮҖ^{2вҲҡ3} tВІ/(tВІ+4) dt
    // = (2/ln2)вҲ«вӮҖ^{2вҲҡ3}(1 - 4/(tВІ+4))dt = (2/ln2)[t-2arctan(t/2)]вӮҖ^{2вҲҡ3}
    // = (2/ln2)[2вҲҡ3-2arctan(вҲҡ3)] = (2/ln2)[2вҲҡ3-2ПҖ/3]
    // = (4/ln2)(вҲҡ3-ПҖ/3)
    // For IвӮҒ: вҲ«logвӮӮ(xВІ+4)dx = (1/ln2)вҲ«ln(xВІ+4)dx
    // вҲ«ln(xВІ+4)dx = xВ·ln(xВІ+4)-вҲ«xВ·2x/(xВІ+4)dx = xВ·ln(xВІ+4)-2вҲ«(1-4/(xВІ+4))dx
    // = xВ·ln(xВІ+4)-2x+4arctan(x/2)+C
    // IвӮҒ=(1/ln2)[xВ·ln(xВІ+4)-2x+4arctan(x/2)]вӮҖ^{2вҲҡ3}
    // At x=2вҲҡ3: ln((12+4))=ln16=4ln2; arctan(вҲҡ3)=ПҖ/3
    // = (1/ln2)[2вҲҡ3В·4ln2 - 4вҲҡ3 + 4ПҖ/3 - 0]
    // = (1/ln2)[8вҲҡ3В·ln2 - 4вҲҡ3 + 4ПҖ/3]
    // = 8вҲҡ3 + (4/ln2)(ПҖ/3-вҲҡ3)
    // Оұ = IвӮҒ+IвӮӮ = 8вҲҡ3 + (4/ln2)(ПҖ/3-вҲҡ3) + (4/ln2)(вҲҡ3-ПҖ/3) = 8вҲҡ3
    // Оұ=8вҲҡ3; ОұВІ=192? Wait: let me recheck IвӮӮ sign
    // IвӮӮ=(4/ln2)(вҲҡ3-ПҖ/3); IвӮҒ=8вҲҡ3+(4/ln2)(ПҖ/3-вҲҡ3)
    // Оұ=8вҲҡ3+(4/ln2)(ПҖ/3-вҲҡ3)+(4/ln2)(вҲҡ3-ПҖ/3)=8вҲҡ3+0=8вҲҡ3
    // ОұВІ=192
  },

    opts:["A-I,B-II,C-III,D-IV","A-II,B-III,C-IV,D-I","A-III,B-IV,C-I,D-II","A-IV,B-I,C-II,D-III"],
    ans:3
    // Spectrochemical series: FвҒ»<HвӮӮO<en<CNвҒ» вҶ’ О”вӮҖ: FвҒ» lowest, CNвҒ» highest
    // [CrFвӮҶ]ВівҒ»: lowest=15060(I); [Cr(HвӮӮO)вӮҶ]ВівҒә=17400(II); [Cr(en)вӮғ]ВівҒә=22300(III); [Cr(CN)вӮҶ]ВівҒ»=26600(IV)

    // Glycerol(1,2,3-trihydroxypropane) has very high bp (290В°C) and is hygroscopic; it forms a non-azeotropic mixture and CAN be separated from water, but not by simple distillation easily вҶ’ I is FALSE

  },

    q:"[Question 65 - data cut off in source]",
    opts:["A","B","C","D"],
    ans:0

  // Note: Section B questions were not provided in the source data

    q:"[Chemistry Section B Q66 вҖ” Integer type question]",

  { no:70, subject:"Chemistry", section:"B", type:"integer",
    q:"[Chemistry Section B Q70 вҖ” Integer type question]",

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CORRECT ANSWERS (fixes) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Apply corrected answers based on detailed solving above
const correctedAnswers = {
  2: 3,   // 10(x-3y)=75
  4: 1,   // Only S2 correct
  9: 2,   // 3h+k=13
  11: 3,  // 1/2
  12: 3,  // n(S)=9
  14: 2,  // max=60
  15: 2,  // 34(a+b+c)=100
  16: 1,  // a+b+m=6
  19: 1,  // (1/2)(eВІ+eВі-...)
  22: 91, // ОЈkВІ=91 (integer)
  23: 81, // m+n=81 (integer)
  24: 8,  // rВІ=8 (integer)
  25: 192, // ОұВІ=192 (integer)
  26: 1,  // 2a-b+c=1
  28: 1,  // |a|=9
  29: 3,  // A,B,D
  31: 2,  // 130
  32: 1,  // 66.67%
  34: 3,  // E1/E2=9/4
  36: 1,  // 2вҲҡ3
  42: 1,  // Оұ=4
  44: 2,  // -0.38 eV
  45: 1,  // ОұвүҲ7
  47: 120, // 120kJ (integer)
  48: 171, // Оұ=171 (integer)
  50: 387, // 387g (integer)
  56: 3,  // вҲӣx/вҲҡy
};

// Apply corrections
questions.forEach((q, i) => {
  if (correctedAnswers[q.no] !== undefined) {
    q.ans = correctedAnswers[q.no];
  }
});

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const userAnswers = {};  // qIdx вҶ’ value (MCQ: 0-3, Integer: string)
let submitted = false;

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ BUILD UI в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildQuiz() {
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';
  document.getElementById('totalCount').textContent = questions.length;

  const optLabels = ['A','B','C','D'];
  let lastSubject = '', lastSection = '';

  questions.forEach((q, idx) => {
    // Section heading
    if (q.subject !== lastSubject) {
      lastSubject = q.subject;
      lastSection = '';
      const badge = q.subject.toLowerCase();
      const range = q.subject==='Mathematics'?'Q1вҖ“25':q.subject==='Physics'?'Q26вҖ“50':'Q51вҖ“70';
      area.insertAdjacentHTML('beforeend', `
        <div class="section-head">
          <h2>${q.subject}</h2>
          <span class="section-badge badge-${badge}">${range}</span>
        </div>
      `);
    }
    if (q.section !== lastSection) {
      lastSection = q.section;
      const label = q.section==='A' ? 'Section A вҖ” Multiple Choice (MCQ)' : 'Section B вҖ” Integer Type';
      area.insertAdjacentHTML('beforeend', `<div class="subsection-label">${label}</div>`);
    }

    // Card
    const card = document.createElement('div');
    card.className = `q-card${q.type==='integer'?' integer-type':''}`;
    card.id = `qcard-${idx}`;

    const typeTag = q.type==='mcq'
      ? `<span class="q-type-tag tag-mcq">MCQ +4/вҲ’1</span>`
      : `<span class="q-type-tag tag-int">Integer +4/0</span>`;

    let inputHtml = '';
    if (q.type==='mcq') {
      const optRows = q.opts.map((opt,oi)=>`
        <button class="opt-btn" id="opt-${idx}-${oi}" onclick="selectMCQ(${idx},${oi})">
          <span class="opt-label">${optLabels[oi]}</span>
          <span>${opt}</span>
        </button>
      `).join('');
      inputHtml = `<div class="options-grid">${optRows}</div>`;
    } else {
      inputHtml = `
        <div class="int-input-wrap">
          <input type="number" class="int-input" id="int-${idx}" placeholder="Enter integer"
            oninput="selectInteger(${idx}, this.value)" />
          <span style="font-size:0.8rem;color:var(--ink3);font-family:'DM Mono',monospace">Press Enter or type answer</span>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="q-number">Q${q.no} В· ${q.subject.toUpperCase()} В· ${typeTag}</div>
      <div class="q-text">${q.q}</div>
      ${q.diagram ? `<div class="diagram-box">рҹ“җ Diagram coming soon вҖ” refer to original paper</div>` : ''}
      ${inputHtml}
      <div class="q-feedback" id="fb-${idx}"></div>
    `;

    area.appendChild(card);
  });
}

function selectMCQ(idx, optIdx) {
  if (submitted) return;
  // Store as number explicitly
  userAnswers[idx] = Number(optIdx);
  const btns = document.querySelectorAll(`#qcard-${idx} .opt-btn`);
  btns.forEach((b, i) => { b.classList.toggle('selected', i === optIdx); });
  document.getElementById(`qcard-${idx}`).classList.add('answered');
  updateProgress();
}

function selectInteger(idx, val) {
  if (submitted) return;
  userAnswers[idx] = val === '' ? null : val;
  const card = document.getElementById(`qcard-${idx}`);
  if (val !== '') card.classList.add('answered');
  else card.classList.remove('answered');
  updateProgress();
}

function updateProgress() {
  // BUG FIX: index 0 is falsy вҖ” use hasOwnProperty check instead
  const att = Object.keys(userAnswers).filter(k => {
    const v = userAnswers[k];
    return v !== null && v !== '' && v !== undefined;
  }).length;
  document.getElementById('attemptCount').textContent = att;
  const pct = (att / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  document.getElementById('submitBtn').disabled = true;

  let correct = 0, wrong = 0, skipped = 0, score = 0;
  let mcqWrong = 0;
  const optLabels = ['A', 'B', 'C', 'D'];

  questions.forEach((q, idx) => {
    const fb = document.getElementById(`fb-${idx}`);
    const userVal = userAnswers[idx];

    if (q.type === 'mcq') {
      const btns = document.querySelectorAll(`#qcard-${idx} .opt-btn`);
      btns.forEach(b => b.disabled = true);

      // Always highlight the correct answer
      if (btns[q.ans]) btns[q.ans].classList.add('reveal');

      // BUG FIX: check with hasOwnProperty so index 0 (option A) is not treated as skipped
      const hasAnswer = userAnswers.hasOwnProperty(idx) && userVal !== null && userVal !== undefined;

      if (!hasAnswer) {
        skipped++;
        fb.className = 'q-feedback show fb-skip';
        fb.textContent = `вҠҳ Skipped вҖ” Correct: ${optLabels[q.ans]}`;
      } else if (Number(userVal) === Number(q.ans)) {
        correct++;
        score += 4;
        if (btns[userVal]) {
          btns[userVal].classList.remove('selected', 'reveal');
          btns[userVal].classList.add('correct');
        }
        fb.className = 'q-feedback show fb-correct';
        fb.textContent = `вң“ Correct! +4 marks`;
      } else {
        wrong++;
        mcqWrong++;
        score -= 1;
        if (btns[userVal]) {
          btns[userVal].classList.remove('selected');
          btns[userVal].classList.add('wrong');
        }
        fb.className = 'q-feedback show fb-wrong';
        fb.textContent = `вң— Wrong (You: ${optLabels[userVal]}, Correct: ${optLabels[q.ans]}) вҲ’1 mark`;
      }

    } else {
      // Integer type
      const inp = document.getElementById(`int-${idx}`);
      if (inp) inp.disabled = true;

      const hasAnswer = userAnswers.hasOwnProperty(idx) && userVal !== null && userVal !== '' && userVal !== undefined;
      const userNum = hasAnswer ? Number(userVal) : null;
      const correctNum = Number(q.ans);

      if (!hasAnswer) {
        skipped++;
        fb.className = 'q-feedback show fb-skip';
        fb.textContent = `вҠҳ Skipped вҖ” Correct answer: ${correctNum}`;
      } else if (userNum === correctNum) {
        correct++;
        score += 4;
        if (inp) inp.classList.add('int-correct');
        fb.className = 'q-feedback show fb-correct';
        fb.textContent = `вң“ Correct! +4 marks`;
      } else {
        wrong++;
        // No negative marking for integer type in JEE
        if (inp) inp.classList.add('int-wrong');
        fb.className = 'q-feedback show fb-wrong';
        fb.textContent = `вң— Wrong (You entered: ${userNum}, Correct: ${correctNum}) вҖ” No penalty for integers`;
      }
    }
  });

  // BUG FIX: max score = only MCQ questions count for max (integers add 4 each but no negative)
  const mcqCount = questions.filter(q => q.type === 'mcq').length;
  const intCount = questions.filter(q => q.type === 'integer').length;
  const maxScore = (mcqCount + intCount) * 4;

  const attempted = correct + wrong;
  const accuracy = attempted > 0 ? ((correct / attempted) * 100).toFixed(1) : '0.0';

  // BUG FIX: score can be negative вҖ” clamp only the bar percentage, not the displayed score
  const barPct = Math.max(0, Math.min(100, (score / maxScore) * 100));

  document.getElementById('finalScore').textContent = score;
  document.getElementById('maxScore').textContent = maxScore;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkip').textContent = skipped;
  document.getElementById('rPos').textContent = '+' + (correct * 4);
  document.getElementById('rNeg').textContent = '-' + mcqWrong;
  document.getElementById('rAcc').textContent = accuracy + '%';
  document.getElementById('scorePct').textContent =
    `${barPct.toFixed(1)}% of maximum marks (${correct} correct В· ${wrong} wrong В· ${skipped} skipped)`;

  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });

  // Mini header scoreboard
  document.getElementById('scoreStrip').classList.add('visible');
  document.getElementById('hCorrect').textContent = correct;
  document.getElementById('hWrong').textContent = wrong;
  document.getElementById('hScore').textContent = score;

  setTimeout(() => {
    document.getElementById('scoreBarFill').style.width = barPct + '%';
  }, 400);
}

function resetQuiz() {
  submitted = false;
  Object.keys(userAnswers).forEach(k=>delete userAnswers[k]);
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('scoreStrip').classList.remove('visible');
  updateProgress();
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildQuiz();
updateProgress();
</script>
